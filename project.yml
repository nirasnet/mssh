name: mssh
options:
  bundleIdPrefix: com.m4ck
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.13.0"
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: "0.9.0"

targets:
  mssh:
    type: application
    platform: iOS
    sources:
      - path: mssh
        excludes:
          - "Info-macOS.plist"
          - "mssh-mac.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.m4ck.mssh
        DEVELOPMENT_TEAM: CC24ZA67DK
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "7"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
      - package: Citadel
        product: Citadel
    info:
      path: mssh/Info.plist
      properties:
        CFBundleIdentifier: com.m4ck.mssh
        CFBundleDisplayName: mSSH
        CFBundleShortVersionString: "1.1.0"
        CFBundleVersion: "7"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiresFullScreen: false
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSFaceIDUsageDescription: mSSH uses Face ID to protect access to your SSH connections and keys.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: mssh/mssh.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.m4ck.mssh
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.m4ck.mssh

  mssh-mac:
    type: application
    platform: macOS
    sources:
      - path: mssh
        excludes:
          - "Info.plist"
          - "mssh.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.m4ck.mssh
        DEVELOPMENT_TEAM: CC24ZA67DK
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "7"
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
      - package: Citadel
        product: Citadel
    info:
      path: mssh/Info-macOS.plist
      properties:
        CFBundleDisplayName: mSSH
        CFBundleShortVersionString: "1.1.0"
        CFBundleVersion: "7"
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    entitlements:
      path: mssh/mssh-mac.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        # Read-only access to folders the user picks via NSOpenPanel —
        # required so the .ssh importer can scan ~/.ssh/.
        com.apple.security.files.user-selected.read-only: true
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.m4ck.mssh
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.m4ck.mssh

schemes:
  mssh:
    build:
      targets:
        mssh: all
    run:
      config: Debug
    profile:
      config: Release
  mssh-mac:
    build:
      targets:
        mssh-mac: all
    run:
      config: Debug
    profile:
      config: Release
