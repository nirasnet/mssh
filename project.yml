name: mssh
options:
  bundleIdPrefix: com.m4ck
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_UILaunchScreen_Generation: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.13.0"
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: "0.9.0"

targets:
  mssh:
    type: application
    platform: iOS
    sources:
      - mssh
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
      - package: Citadel
        product: Citadel
    info:
      path: mssh/Info.plist
      properties:
        CFBundleDisplayName: mSSH
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.m4ck.mssh
        DEVELOPMENT_TEAM: ""
    entitlements:
      path: mssh/mssh.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.m4ck.mssh

schemes:
  mssh:
    build:
      targets:
        mssh: all
    run:
      config: Debug
    profile:
      config: Release
